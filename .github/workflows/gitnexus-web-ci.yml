name: gitnexus-web CI

on:
  push:
    branches: [main]
    paths: ['gitnexus-web/**']
  pull_request:
    branches: [main]
    paths: ['gitnexus-web/**']

defaults:
  run:
    working-directory: gitnexus-web

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gitnexus-web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
