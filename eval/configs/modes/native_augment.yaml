# Native + Augment mode — the primary evaluation mode
#
# Combines two capabilities (mirroring the Claude Code model):
# 1. Explicit soleil-ai-review-engine tools: soleil-ai-review-engine-query, soleil-ai-review-engine-context, soleil-ai-review-engine-impact, soleil-ai-review-engine-cypher
#    Available as fast bash commands (~100ms via eval-server)
# 2. Automatic grep enrichment: grep/rg results are transparently augmented with
#    [soleil-ai-review-engine] annotations showing callers, callees, and execution flows
#
# The agent decides when to use explicit tools vs rely on enriched grep results.
agent:
  agent_class: "eval.agents.soleil-ai-review-engine_agent.soleil-ai-review-engineAgent"
  soleil-ai-review-engine_mode: "native_augment"
  step_limit: 30
  cost_limit: 3.0
  augment_timeout: 5.0
  augment_min_pattern_length: 3
  track_soleil-ai-review-engine_usage: true

environment:
  environment_class: "eval.environments.soleil-ai-review-engine_docker.soleil-ai-review-engineDockerEnvironment"
  enable_soleil-ai-review-engine: true
  skip_embeddings: true
  soleil-ai-review-engine_timeout: 120
  eval_server_port: 4848
